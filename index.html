<!DOCTYPE html>
<html>
<head>
    <title>Solar System Game</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            position: absolute;
            width: 100%;
            top: 10px;
        }

        .score {
            position: absolute;
            top: 50px;
            width: 100%;
            font-size: 20px;
        }

        .target {
            position: absolute;
            top: 80px;
            width: 100%;
            font-size: 18px;
            color: yellow;
        }

        .solar-system {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .sun {
            width: 80px;
            height: 80px;
            background: yellow;
            border-radius: 50%;
            box-shadow: 0 0 50px orange;
        }

        .orbit {
            position: absolute;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: rotate linear infinite;
        }

        .planet {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            cursor: pointer;
        }

        .earth-orbit { width: 220px; height: 220px; animation-duration: 10s; }
        .mars-orbit { width: 320px; height: 320px; animation-duration: 15s; }
        .saturn-orbit { width: 420px; height: 420px; animation-duration: 20s; }

        .earth {
            width: 30px;
            height: 30px;
            background: blue;
        }

        .mars {
            width: 25px;
            height: 25px;
            background: red;
        }

        .saturn {
            width: 35px;
            height: 35px;
            background: gold;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .highlight {
            box-shadow: 0 0 20px yellow;
        }

    </style>
</head>

<body>

<h1>🎮 Solar System Game</h1>
<div class="score">Score: <span id="score">0</span></div>
<div class="target">Target: <span id="target">Earth</span></div>

<div class="solar-system">

    <div class="sun"></div>

    <div class="orbit earth-orbit">
        <div class="planet earth" onclick="clickPlanet('earth')" id="earth"></div>
    </div>

    <div class="orbit mars-orbit">
        <div class="planet mars" onclick="clickPlanet('mars')" id="mars"></div>
    </div>

    <div class="orbit saturn-orbit">
        <div class="planet saturn" onclick="clickPlanet('saturn')" id="saturn"></div>
    </div>

</div>

<script>
let score = 0;
let planets = ["earth", "mars", "saturn"];
let currentTarget = "earth";

function setTarget() {
    planets.forEach(p => {
        document.getElementById(p).classList.remove("highlight");
    });

    currentTarget = planets[Math.floor(Math.random() * planets.length)];
    document.getElementById("target").innerText = currentTarget.toUpperCase();
    document.getElementById(currentTarget).classList.add("highlight");
}

function clickPlanet(name) {
    if (name === currentTarget) {
        score++;
    } else {
        score--;
    }

    document.getElementById("score").innerText = score;
    setTarget();
}

setTarget();
</script>

</body>
</html>
