<!DOCTYPE html>
<html>
<head>
  <title>3D Space Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin:0; overflow:hidden; background:black; }
    #info {
      position:absolute;
      top:10px;
      left:10px;
      color:white;
      font-family:Arial;
    }
    #btn {
      position:absolute;
      top:40px;
      left:10px;
      padding:8px;
      background:black;
      color:white;
      border:1px solid white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div id="info">🌌 3D Solar System Simulator</div>
<button id="btn">Play Sound 🔊</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth/window.innerHeight, 0.1, 2000
);
camera.position.set(0, 20, 50);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* CONTROLS (mouse rotate/zoom) */
const controls = new THREE.OrbitControls(camera, renderer.domElement);

/* LIGHT */
const light = new THREE.PointLight(0xffffff, 2, 2000);
scene.add(light);

/* SUN */
const sunGeo = new THREE.SphereGeometry(8, 32, 32);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
const sun = new THREE.Mesh(sunGeo, sunMat);
scene.add(sun);

/* PLANET FUNCTION */
function createPlanet(size, color, distance, speed) {
  const geo = new THREE.SphereGeometry(size, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color: color });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  return { mesh, distance, speed, angle: Math.random()*Math.PI*2 };
}

/* PLANETS */
const earth = createPlanet(2, 0x2233ff, 20, 0.01);
const mars = createPlanet(1.5, 0xff3300, 30, 0.008);
const jupiter = createPlanet(4, 0xffaa66, 45, 0.005);

/* STARS BACKGROUND */
for(let i=0;i<1000;i++){
  const starGeo = new THREE.SphereGeometry(0.2, 8, 8);
  const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const star = new THREE.Mesh(starGeo, starMat);

  star.position.set(
    (Math.random()-0.5)*1000,
    (Math.random()-0.5)*1000,
    (Math.random()-0.5)*1000
  );

  scene.add(star);
}

/* SOUND */
const audio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
audio.loop = true;
audio.volume = 0.3;

document.getElementById("btn").onclick = () => {
  audio.play();
};

/* ANIMATION */
function animate(){
  requestAnimationFrame(animate);

  [earth, mars, jupiter].forEach(p => {
    p.angle += p.speed;
    p.mesh.position.x = Math.cos(p.angle) * p.distance;
    p.mesh.position.z = Math.sin(p.angle) * p.distance;
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

/* RESIZE */
window.addEventListener("resize", () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

</body>
</html>
